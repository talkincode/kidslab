name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build courseware
        run: npm run build
        env:
          # 仓库变量优先于 package.json 的 kidslab.analyticsEndpoint；均未设置则不注入埋点
          KIDSLAB_ANALYTICS_ENDPOINT: ${{ vars.KIDSLAB_ANALYTICS_ENDPOINT }}

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r index.html assets courseware _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
