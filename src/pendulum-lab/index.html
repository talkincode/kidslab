<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>单摆实验室 · KidsLab</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <script src="../../scripts/sdk/core.js" data-kidslab-sdk></script>
</head>
<body>
  <header class="bar">
    <a class="pill" href="../../index.html">← <span data-t="back">返回平台</span></a>
    <h1 class="bar__title">🪀 <span data-t="title">单摆实验室</span></h1>
    <div class="bar__actions">
      <button class="pill pill--icon" id="themeBtn" type="button" aria-label="切换主题">🌙</button>
      <button class="pill" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel stage-wrap">
      <canvas id="stage"></canvas>
      <p class="drag-hint" id="dragHint" data-t="dragHint">🖐 拖动摆球，松手开始摆动</p>
    </section>

    <aside class="panel side">
      <section class="ctl">
        <h2 data-t="planet">选择星球</h2>
        <div class="planets" id="planets"></div>
        <p class="model-note" data-t="modelNote">参考重力下的理想环境；公式适用于约 15° 以内的小摆角。</p>
      </section>

      <section class="ctl">
        <label class="sl">
          <span><span data-t="length">摆长 L</span> <b id="lenVal">1.5 m</b></span>
          <input id="lenRange" type="range" min="0.4" max="3" step="0.05" value="1.5" />
        </label>
      </section>

      <section class="readout">
        <div class="ro">
          <p class="ro__label" data-t="theory">小角近似周期 2π√(L/g)</p>
          <p class="ro__val"><b id="tTheory">2.46</b> s</p>
        </div>
        <div class="ro">
          <p class="ro__label" data-t="measured">仿真测得周期</p>
          <p class="ro__val ro__val--m"><b id="tMeasured">—</b> s</p>
        </div>
      </section>
      <p class="note" id="bigAngleNote" hidden data-t="bigAngle">💡 超过约 15° 时，仿真周期会比小角公式预测值更长。</p>

      <div class="btns">
        <button class="btn" id="playBtn" type="button">⏸ <span data-t="pause">暂停</span></button>
        <button class="btn btn--ghost" id="resetBtn" type="button">↺ <span data-t="reset">重置</span></button>
      </div>
    </aside>
  </main>

  <script src="main.js"></script>
</body>
</html>
