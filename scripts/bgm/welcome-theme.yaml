  # 星尘：极稀疏的高音闪烁（大量休止）
  stardust:
    - { degree: 0, beats: 3 }
    - { degree: 12, beats: 1 }
    - { degree: 0, beats: 4 }
    - { degree: 0, beats: 2 }
