    - { degree: 0, beats: 4 }
    - { degree: 0, beats: 3 }
    - { degree: 15, beats: 1 }
    - { degree: 0, beats: 4 }

tracks:
  # ---- base 层：台灯与书桌 ----
  - { instrument: music_box, pattern: melody, motif: lumen, intensity: 0.6, pan: 0.45, reverb: 0.45 }
  - { instrument: harp, pattern: arpeggio, intensity: 0.32, pan: 0.62, reverb: 0.4 }
  - { instrument: warm_pad, pattern: sustain, intensity: 0.38, pan: 0.5, reverb: 0.55 }
