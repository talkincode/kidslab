  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">

</head>
<body>
  <header class="bar">
    <a class="pill" href="../../index.html">← <span data-t="back">返回平台</span></a>
    <h1 class="bar__title">👕 <span data-t="title">搭配衣橱</span></h1>
    <div class="bar__actions">
      <button class="pill pill--icon" id="themeBtn" type="button" aria-label="切换主题">🌙</button>
      <button class="pill" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div>
        <p class="eyebrow" data-t="eyebrow">羊驼造型工作室</p>
        <p class="tip" id="tip" data-t="tip">帽子选一顶，上衣选一件，找齐所有不重样的搭配。</p>
      </div>
      <div class="order-stamp" aria-hidden="true"><span>✿</span><b id="orderStamp">0 / 4</b></div>
    </section>

    <nav class="level-strip" id="levelStrip" aria-label="关卡"></nav>

    <section class="game-shell">
      <section class="studio card" aria-labelledby="missionTitle">
        <div class="mission">
          <div>
            <p class="mission__label" data-t="mission">今日造型单</p>
            <h2 id="missionTitle">让 2 × 2 棵搭配树开花</h2>
          </div>
          <button class="icon-button" id="resetBtn" type="button" aria-label="重新开始">↻</button>
        </div>

        <div class="collect-game" id="collectGame">
          <div class="alpaca-stage">
            <div class="mirror-stars" aria-hidden="true">✦ · ✿ · ✦</div>
            <div class="alpaca" aria-label="小羊驼模特">
              <span class="alpaca__hat" id="alpacaHat">👒</span>
              <span class="alpaca__head">🦙</span>
              <span class="alpaca__top" id="alpacaTop">★</span>
            </div>
            <div class="runway" aria-hidden="true"></div>
          </div>

          <div class="wardrobe">
            <div class="rack">
              <p class="rack__label" data-t="chooseHat">先选一顶帽子</p>
              <div class="choice-row" id="hatChoices"></div>
            </div>
            <div class="rack">
              <p class="rack__label" data-t="chooseTop">再选一件上衣</p>
              <div class="choice-row" id="topChoices"></div>
            </div>
            <button class="dress-button" id="dressBtn" type="button" data-t="dress">✨ 穿上这套</button>
          </div>
        </div>

        <div class="stock-game" id="stockGame" hidden>
          <div class="delivery-scene" aria-hidden="true">
            <div class="awning">FASHION 12</div>
            <div class="delivery-box delivery-box--hat">🎩<b id="hatBoxCount">2</b></div>
            <div class="delivery-box delivery-box--top">👕<b id="topBoxCount">2</b></div>
            <div class="flashbulbs">✦ ✦ ✦</div>
          </div>
          <div class="stock-controls">
            <div class="stock-picker">
              <p data-t="stockHats">进几顶不同的帽子？</p>
              <div class="number-row" id="hatStock"></div>
            </div>
            <div class="stock-picker">
              <p data-t="stockTops">进几件不同的上衣？</p>
              <div class="number-row" id="topStock"></div>
            </div>
            <button class="dress-button" id="orderBtn" type="button" data-t="order">📦 提交进货单</button>
          </div>
        </div>
      </section>

      <aside class="result-card card">
        <div class="stylist">
          <span class="stylist__face" id="stylistFace" aria-hidden="true">🦙</span>
          <p id="feedback" aria-live="polite">先从衣架上选一顶帽子和一件上衣吧！</p>
        </div>

        <section class="combo-tree" id="comboTree" aria-label="搭配树"></section>
        <div class="formula" id="formula" aria-live="polite">2 顶帽子 × 2 件上衣 = 4 套</div>

        <button class="hint-button" id="hintBtn" type="button" data-t="hint">💡 给我一点提示</button>
      </aside>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal__card">
      <div class="celebration" id="celebration" aria-hidden="true">🌳</div>
      <p class="modal__kicker" data-t="showReady">时装秀准备就绪</p>
      <h2 id="modalTitle">四套搭配都开花啦！</h2>
      <p id="modalText"></p>
      <button class="next-button" id="nextBtn" type="button">下一张造型单</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
