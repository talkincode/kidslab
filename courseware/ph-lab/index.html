</head>
<body>
  <header class="bar">
    <a class="pill" href="../../index.html">← <span data-t="back">返回平台</span></a>
    <h1 class="bar__title">🧪 <span data-t="title">酸碱魔法水</span></h1>
    <div class="bar__actions">
      <button class="pill pill--icon" id="themeBtn" type="button" aria-label="切换主题">🌙</button>
      <button class="pill" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel beaker-zone">
      <svg id="beaker" viewBox="0 0 220 260" role="img" aria-label="beaker">
        <defs>
          <clipPath id="liquidClip"><path d="M58 60 L58 196 Q58 224 86 224 L134 224 Q162 224 162 196 L162 60 Z"/></clipPath>
        </defs>
        <g clip-path="url(#liquidClip)">
          <rect id="liquid" x="50" y="110" width="120" height="120" fill="#8fd6a2"/>
          <ellipse id="liquidTop" cx="110" cy="112" rx="52" ry="7" fill="#ffffff" opacity="0.35"/>
          <circle class="bub b1" cx="90" cy="200" r="5"/>
          <circle class="bub b2" cx="115" cy="210" r="3.6"/>
          <circle class="bub b3" cx="135" cy="205" r="4.4"/>
        </g>
        <path d="M50 34 L58 44 L58 196 Q58 224 86 224 L134 224 Q162 224 162 196 L162 44 L170 34"
              fill="none" stroke="#3d5a63" stroke-width="5" stroke-linecap="round"/>
        <line x1="150" y1="88" x2="162" y2="88" stroke="#3d5a63" stroke-width="3"/>
        <line x1="150" y1="132" x2="162" y2="132" stroke="#3d5a63" stroke-width="3"/>
        <line x1="150" y1="176" x2="162" y2="176" stroke="#3d5a63" stroke-width="3"/>
      </svg>
      <div class="verdict">
        <p class="verdict__ph">pH <b id="phVal">7.0</b></p>
        <p class="verdict__tag" id="phTag">中性</p>
        <p class="verdict__h" id="hIon">估算 [H₃O⁺] ≈ 1×10⁻⁷ mol/L</p>
      </div>
      <p class="scope-note" data-t="scopeNote">约 25 °C 的常见稀水溶液教学模型；样品 pH 与颜色均为示意。</p>
      <p class="safety-note" data-t="safety">仅为虚拟模拟。现实中切勿混合漂白水与氨水、食醋、柠檬汁或其他清洁剂。</p>
    </section>

    <aside class="panel side">
      <section>
        <h2 data-t="secSub">选择一杯样品（不会混合）</h2>
        <div class="subs" id="subs"></div>
      </section>

      <section>
        <h2 data-t="secPh">或者直接调节 pH</h2>
        <div class="ph-slider">
          <input id="phRange" type="range" min="0" max="14" step="0.1" value="7" />
          <div class="ph-scale" aria-hidden="true"></div>
          <div class="ph-ends"><span data-t="acid">← 酸性</span><span data-t="base">碱性 →</span></div>
        </div>
      </section>

      <section>
        <h2 data-t="secInd">换一种指示剂</h2>
        <div class="inds" id="inds"></div>
        <p class="ind-note" id="indNote"></p>
      </section>
    </aside>
  </main>

  <script src="main.js"></script>
</body>
</html>
