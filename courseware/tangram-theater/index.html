</head>
<body>
  <header class="bar">
    <a class="pill" href="../../index.html">← <span data-t="back">返回平台</span></a>
    <h1 class="bar__title">🎭 <span data-t="title">七巧板皮影戏</span></h1>
    <div class="bar__actions">
      <button class="pill pill--icon" id="themeBtn" type="button" aria-label="切换主题">🌙</button>
      <button class="pill" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <main class="app">
    <section class="story-strip">
      <div class="story-strip__seal" aria-hidden="true">影</div>
      <div class="story-strip__copy">
        <p class="eyebrow" data-t="eyebrow">今晚演出：狐狸过河</p>
        <p id="mission">第一幕缺一座桥。把七块木片都送进发光剪影，故事才能继续！</p>
      </div>
      <div class="progress-chip"><span data-t="progress">归位</span> <strong id="progressCount">0/7</strong></div>
    </section>

    <nav class="scene-tabs" id="sceneTabs" aria-label="故事幕次"></nav>

    <section class="game-shell">
      <section class="theater" aria-label="皮影戏舞台">
        <div class="curtain curtain--left" aria-hidden="true"></div>
        <div class="curtain curtain--right" aria-hidden="true"></div>
        <canvas id="stage" role="img" aria-label="可拖动的七巧板拼图舞台"></canvas>
        <div class="stage-badge"><span data-t="act">幕</span> <strong id="actNumber">1</strong></div>
      </section>

      <aside class="toolbox">
        <div class="toolbox__head">
          <div>
            <p class="eyebrow" data-t="workbench">后台木片桌</p>
            <h2 id="pieceName">大三角一</h2>
          </div>
          <button class="reset-button" id="resetBtn" type="button" aria-label="重开本幕">↻</button>
        </div>

        <p class="feedback" id="feedback" aria-live="polite">拖住木片送到同形剪影。方向不对，就转一转！</p>

        <div class="piece-shelf" id="pieceShelf" role="listbox" aria-label="七巧板木片"></div>

        <div class="control-row" role="group" aria-label="木片动作">
          <button class="control" id="leftBtn" type="button" aria-label="向左转">↶ <span data-t="turnLeft">左转</span></button>
          <button class="control" id="rightBtn" type="button" aria-label="向右转"><span data-t="turnRight">右转</span> ↷</button>
          <button class="control" id="flipBtn" type="button" aria-label="翻面">⇋ <span data-t="flip">翻面</span></button>
        </div>

        <button class="hint-button" id="hintBtn" type="button" aria-label="灯笼提示：帮我放一块"><span aria-hidden="true">🏮</span> <span data-t="hint">灯笼提示：帮我放一块</span></button>
      </aside>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal__card">
      <div class="modal__spark" aria-hidden="true">✦</div>
      <p class="modal__kicker" id="modalKicker">第一幕 · 桥</p>
      <div class="modal__art" id="modalArt" aria-hidden="true">🦊🌉</div>
      <h2 id="modalTitle">桥架起来了！</h2>
      <p id="modalText">七块木片没有变大或缩小，只是滑动、转向和翻面，就组成了新的轮廓。</p>
      <button class="next-button" id="nextBtn" type="button">下一幕 →</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
